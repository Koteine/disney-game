<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Battle 50</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fff5f8; text-align: center; color: #444; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 500px; margin: 15px auto; }
        .cell { width: 100%; aspect-ratio: 1/1; border: 1px solid #ddd; border-radius: 8px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-weight: bold; font-size: 12px; }
        .target { border: 3px solid #ff007f !important; transform: scale(1.05); cursor: pointer; background: #fff0f5; box-shadow: 0 0 10px #ff007f; z-index: 10; }
        .p0, .p4, .p8 { background: #ffcdd2 !important; } .p1, .p5, .p9 { background: #e1f5fe !important; }
        .p2, .p6, .p10 { background: #f3e5f5 !important; } .p3, .p7 { background: #e8f5e9 !important; }
        .owner-tag { position: absolute; bottom: 1px; font-size: 7px; width: 100%; text-align: center; }
        #dice-btn { padding: 12px 25px; font-size: 18px; border-radius: 50px; border: none; background: #ff007f; color: white; cursor: pointer; margin: 10px; }
        #dice-btn:disabled { background: #ccc; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; width: 85%; max-width: 300px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 90; }
        .btn-select { padding: 10px; margin: 4px; border: 2px solid #ffcdd2; border-radius: 10px; background: white; cursor: pointer; width: 90%; max-width: 250px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>✨ Disney Battle 50 ✨</h1>
    
    <div id="player-setup">
        <h3>Выбери игрока:</h3>
        <div id="setup-buttons"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <p>Привет, <b id="my-name-display"></b>!</p>
        <button onclick="location.reload()" style="background:none; border:1px solid #ccc; border-radius:10px; padding:5px; cursor:pointer; font-size:10px;">🔄 Сменить персонажа</button>
        <br><br>
        <button id="dice-btn" onclick="roll()">🎲 Бросить кубик</button>
        <p id="status">Нажми на кубик!</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="admin-panel" style="display:none; margin-top:20px; padding:10px; border:2px dashed red;">
        <button onclick="adminResetGame()" style="background:red; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">🚫 СБРОС ИГРЫ</button>
    </div>

    <div id="overlay"></div>
    <div id="modal">
        <h2 id="mTitle" style="font-size:18px;"></h2>
        <div id="mContent" style="margin: 15px 0;"><p id="mText"></p></div>
        <button onclick="confirmTask()" style="padding:12px; background:#4caf50; color:white; border:none; border-radius:10px; cursor:pointer; width:100%; font-weight:bold;">Я ВЫПОЛНИЛА! ✅</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://disneyquest-acaa0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const players = [
            { n: "Межгалактический почеркушка", c: "p0" }, { n: "Марсианин ищет синий", c: "p1" },
            { n: "Краска вытекла", c: "p2" }, { n: "Паста «Красный жуть»", c: "p3" },
            { n: "Баклажан с претензией", c: "p4" }, { n: "Кусь за контур", c: "p5" },
            { n: "Квадратный корень из краски", c: "p6" }, { n: "Крадущийся ленивец", c: "p7" },
            { n: "Графон на ультрах", c: "p8" }, { n: "Пиксельный Мазок", c: "p9" },
            { n: "Залипаю в контур", c: "p10" }
        ];

        // ТВОЙ ТЕКСТ БЕЗ ИЗМЕНЕНИЙ (только исправлены запятые в массиве)
        const tasks = [
            { text: "Ну ка, гений, что же здесь?!", img: "rebus1.png" },
            { text: "Разгадаешь ребус?", img: "rebus2.png" },
            { text: "Что-то на умном", img: "rebus3.png" },
            { text: "Красиво, разноцветно", img: "rebus4.png" },
            { text: "Бляяяяяяястяще", img: "rebus5.png" },
            { text: "Может быть и такое", img: "rebus6.png" },
            { text: "Твой герой тонет что ли? Тогда почему он под водой?" },
            { text: "Грибы.. Я вижу, что грибы повсюду" },
            { text: "Мышек видишь? А они есть. Ну, уши точно вижу" },
            { text: "Давай сделаем дорого-богато! Добавь блестяшек!" },
            { text: "Сосед сверху выберет тебе самый красивый из всех цветов радуги!" },
            { text: "Да, это жестко. Мы, любители ГП заколебем всех. Добавь волшебства на иллюстрацию, давай, не расстраивай меня!" },
            { text: "Уф, понимаю, не у всех... но, может, у тебя есть авторская раскраска? Время нарисовать что-то клёвое!" },
            { text: "Любишь снеговиков? Я нет, но придется." },
            { text: "Усики - пропуск сама знаешь куда ;)" },
            { text: "Усложнение подъехало. Раскрась кривляку" },   
            { text: "Это не просто тыква, а карета, которая забыла переодеться обратно." },  
            { text: "Цвет «Стыдливый Флин Райдер» (смущенно-розовый)" },   
            { text: "Они только что съели целого жука! Акуна Матата!" },   
            { text: "Он притворяется милым и безобидным, чтобы стащить кофе. Цвет — «Лживое очарование» (ну синенький, ну Ститч)" },
            { text: "Задание-сюрприз: Закрой глаза и ткни пальцем в любой номер. Всё для тебя!" },
            { text: "Раскрась что-нибудь съедобное. Господи, я всегда голодна!" },   
            { text: "Я живу в лесу с семью друзьями, Сплю глубоким сном под хрусталями. Мачеха боится красоты моей, Угостила яблоком... ответь скорей!" },  
            { text: "У меня есть голос, но нет ног, Мой отец — подводный царь и бог." },   
            { text: "Мой замок изо льда, и в сердце холода, Я строю стены там, где раньше была пустота. Сестру свою невольно я чуть не погубила, Но песня «Отпусти и забудь» меня освободила." }, 
            { text: "Я живу в тесноте, в золотом сосуде, Но творю чудеса, каких не видели люди. Стоит лишь потереть — и я тут как тут, Три желанья твои меня в гости зовут!" },   
            { text: "У меня большие уши и перчатки белого цвета, Я — самый главный символ на планете этой. Моя подружка — Минни, а собака — Плуто, Со мной всегда весело и очень круто!" },   
            { text: "Я заперта в башне высокой-высокой, Мечтаю о мире, где свет одинокий. Мои волосы — лестница, магия в них, А сковородка — мой лучший защитник от злых." },
            { text: "Я вырос среди диких кошек и лиан, Мой дом — густой лес, а не берег и океан. По деревьям скольжу, словно птица в полете, И «своим» меня в стае волков назовете." }, 
            { text: "Я синего цвета, и память — беда, Забыла я всё: и зачем, и куда..." },
            { text: "Мой папа погиб в пыли от копыт, А дядя мой злой на меня был сердит. Я вырос в пустыне под песню друзей, Вернулся домой, чтоб стать властью земель!" },
            { text: "Я не колдун, не монстр и не зверь, Но в жажде власти я открыл к предательству дверь. Я видел, как брат мой со скал полетел вниз, А племяннику в страхе устроил «сюрприз». Мой шрам на лице — мой единственный знак, Я сделал так, чтобы в царстве воцарился мрак." },
            { text: "Я жду на дне, среди костей и мглы, Мои контракты — острые углы. Я забрала то, чем девчонка дорожила, И в человечий облик хвост её вложила." },
            { text: "Я лучший в деревне, мой бицепс горой, Для каждой девчонки я — местный герой. Но та, что с книгой, меня не оценит, И сердце её чудовище пленит." },
            { text: "Обаятельный гад", img: "aid.png" },
            { text: "Я «связан» с друзьями из мира теней", img: "Facilie.png" },
            { text: "Я мал, суетлив и вечно в заботах, Мой панцирь — броня, а жизнь — как работа. Я должен следить, чтоб принцесса не пела, И в мире людей оказаться не смела. Я дирижёр, хоть и ростом с ладонь, Но в музыке сердца — мой вечный огонь." },
            { text: "Не важно, как сильно ты о чем-то мечтаешь, важно, что ты для этого делаешь", img: "djudi.png" },
            { text: "Мои первые шаги видел весь лес, Я принц, хоть и мал, и лишен был чудес. Мой враг — человек, мой учитель — сова, А лучший мой друг — это кролик-молва." },
            { text: "Я живу в Мире Мертвых, но я не скелет... Хотя, подождите, волос-то и нет! Я гитару украл, чтобы правду найти, И предков своих на мосту обрести." },
            { text: "Я не хочу взрослеть, в Нетландию лечу, И каждого ребёнка за собою увлечу. Мой враг — пират с крюком, мой друг — Динь-Динь, Я феи пыль рассыплю в неба синь." },
            { text: "Я создан из снега, но лето люблю, О тёплых объятиях вечно молю." },
            { text: "Я косы остригла, доспехи надела, Спасти своего я отца захотела." },
            { text: "Я в Новом Орлеане мечтаю о деле — Чтоб свой ресторан я открыла на деле. Но поцелуй обернулся бедой: Я стала зелёной и очень прыгучей... ой!" },
            { text: "Я в доме волшебном живу, где всё дышит, Но магия предков меня не услышит. У всех есть таланты, а я — лишь «своя», Но именно я спасу Каситу, друзья!" },
            { text: "Я монстр огромный, мой мех — бирюза, Пугать малышей — это просто гроза." },
            { text: "Я уколола палец о веретено, И небо для царства в тот миг потемнело. Три феи хранили мой сон вековой, Пока не пришел мой спаситель за мной." },
            { text: "Я был человеком, но стал я рабом, Свой голос отдал, чтоб не быть бедняком. Я тенью хожу за своим господином, И в лампе застрял я, как в склепе едином." },
            { text: "Мои волосы — рыжий безумный костер, Мой нрав непокорный, и глаз мой остер." },
            { text: "Я был эгоистом, но стал я... ламой, И жизнь моя стала сплошною драмой." },
        ];

        let myIndex = null;
        let selectedCell = null;

        // Генерация кнопок выбора
        const setupDiv = document.getElementById('setup-buttons');
        players.forEach((p, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-select';
            btn.innerText = p.n;
            btn.onclick = () => setMe(idx);
            setupDiv.appendChild(btn);
        });

        // Создание сетки (50)
        const gridDiv = document.getElementById('grid');
        for(let i=0; i<50; i++) {
            let div = document.createElement('div');
            div.className = 'cell'; div.id = 'cell-' + i;
            div.innerHTML = `<div>${i+1}</div>`;
            gridDiv.appendChild(div);
        }

        function setMe(idx) {
            myIndex = idx;
            document.getElementById('player-setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('my-name-display').innerText = players[idx].n;
        }

        function roll() {
            document.getElementById('dice-btn').disabled = true;
            db.ref('board').once('value', (snap) => {
                const data = snap.val() || {};
                let free = [];
                for(let i=0; i<50; i++) if(!data[i]) free.push(i);
                if(free.length === 0) { alert("Ура! Все выполнено!"); return; }
                selectedCell = free[Math.floor(Math.random() * free.length)];
                document.getElementById('status').innerText = "Твоя цель: клетка №" + (selectedCell + 1);
                const target = document.getElementById('cell-' + selectedCell);
                target.classList.add('target');
                target.onclick = function() {
                    const task = tasks[selectedCell] || { text: "Просто раскрась!" };
                    document.getElementById('mTitle').innerText = "Задание №" + (selectedCell + 1);
                    let html = "";
                    if (task.img) html += `<img src="${task.img}" style="width:100%; border-radius:10px; margin-bottom:10px;">`;
                    html += `<p>${task.text}</p>`;
                    document.getElementById('mText').innerHTML = html;
                    document.getElementById('modal').style.display = 'block';
                    document.getElementById('overlay').style.display = 'block';
                };
            });
        }

        function confirmTask() {
            db.ref('board/' + selectedCell).set({ owner: myIndex }).then(() => {
                document.getElementById('modal').style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('dice-btn').disabled = false;
                document.getElementById('status').innerText = "Захвачено!";
                document.getElementById('cell-' + selectedCell).classList.remove('target');
                selectedCell = null;
            });
        }

        db.ref('board').on('value', (snap) => {
            const data = snap.val() || {};
            for(let i=0; i<50; i++) {
                const cell = document.getElementById('cell-' + i);
                if (!cell) continue;
                if (data[i]) {
                    const p = players[data[i].owner];
                    if (p) {
                        cell.className = 'cell ' + p.c;
                        cell.innerHTML = `<div>${i+1}</div><div class="owner-tag">${p.n.split(' ')[0]}</div>`;
                        cell.onclick = null;
                    }
                } else {
                    cell.className = 'cell'; cell.innerHTML = `<div>${i+1}</div>`;
                }
            }
        });

        function adminResetGame() { if(confirm("Сбросить всё?")) db.ref('board').remove(); }

        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            if (tg.initDataUnsafe?.user?.id === 341995937) document.getElementById('admin-panel').style.display = 'block';
        } catch(e) {}
    </script>
</body>
</html>
