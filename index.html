<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f8; text-align: center; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 400px; margin: 15px auto; }
        .cell { 
            width: 60px; height: 60px; border: 1px solid #ccc; border-radius: 8px; 
            background: white; display: flex; align-items: center; justify-content: center; 
            position: relative; font-weight: bold; font-size: 14px;
        }
        .target { border: 3px solid #ff007f !important; background: #fff0f5 !important; }
        .p0 { background: #ffcdd2 !important; } .p1 { background: #e1f5fe !important; } 
        .p2 { background: #f3e5f5 !important; } .p3 { background: #e8f5e9 !important; } 
        .owner-tag { position: absolute; bottom: 2px; font-size: 8px; width: 100%; text-align: center; color: #333; }
        .btn-select { padding: 12px; margin: 8px; border: 2px solid #ffcdd2; border-radius: 10px; background: white; width: 220px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #dice-btn { padding: 15px 30px; font-size: 20px; border-radius: 50px; border: none; background: #ff007f; color: white; cursor: pointer; margin: 20px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; z-index: 1100; width: 260px; }
    </style>
</head>
<body>

    <h2 id="main-title">✨ Disney Battle ✨</h2>

    <div id="admin-panel" style="display: none;">
        <button onclick="resetGame()" style="background: #333; color: white; padding: 5px 10px; border-radius: 10px; border: none; margin-bottom: 10px;">🔄 СБРОС КАРТЫ (ХОЗЯЙКА)</button>
    </div>
    
    <div id="player-setup">
        <h3>Выбери своего героя:</h3>
        <button class="btn-select" onclick="setMe(0)">✨ Королева Блесток</button><br>
        <button class="btn-select" onclick="setMe(1)">🖌️ Мастер Кисточки</button><br>
        <button class="btn-select" onclick="setMe(2)">🦄 Эльф Раскрасок</button><br>
        <button class="btn-select" onclick="setMe(3)">🍭 Леди Палитра</button>
    </div>
