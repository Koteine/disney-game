<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney Online Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background: #fff5f8; text-align: center; color: #444; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 500px; margin: 20px auto; }
        .cell { 
            width: 100%; aspect-ratio: 1 / 1; border: 2px solid #ddd; border-radius: 12px; 
            background: white; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; cursor: default; transition: 0.3s; position: relative; font-weight: bold; font-size: 14px;
        }
        .target { border: 4px solid #ff007f !important; transform: scale(1.05); cursor: pointer; background: #fff0f5; box-shadow: 0 0 15px #ff007f; z-index: 10; }
        
        .p0 { background: #ffcdd2 !important; border-color: #f44336; }
        .p1 { background: #e1f5fe !important; border-color: #03a9f4; }
        .p2 { background: #f3e5f5 !important; border-color: #9c27b0; }
        .p3 { background: #e8f5e9 !important; border-color: #4caf50; }
        
        .owner-tag { position: absolute; bottom: 2px; font-size: 8px; text-transform: uppercase; color: #333; width: 100%; overflow: hidden; }
        
        #dice-btn { padding: 15px 30px; font-size: 20px; border-radius: 50px; border: none; background: #ff007f; color: white; cursor: pointer; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #dice-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; width: 80%; max-width: 300px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 90; }
        
        .btn-select { padding: 12px; margin: 5px; border: 2px solid #ffcdd2; border-radius: 10px; background: white; cursor: pointer; width: 80%; max-width: 250px; font-size: 16px; }
        
        /* Стили для админ-кнопки */
        #admin-panel { display: none; margin-top: 30px; padding: 20px; border-top: 2px dashed #ccc; }
        .admin-btn { background: #333; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>✨ Disney Battle ✨</h1>
    
    <div id="player-setup">
        <h3>Выбери, кто ты сегодня:</h3>
        <button class="btn-select" onclick="setMe(0)">✨ Королева Блесток</button>
        <button class="btn-select" onclick="setMe(1)">🖌️ Мастер Кисточки</button>
        <button class="btn-select" onclick="setMe(2)">🦄 Эльф Раскрасок</button>
        <button class="btn-select" onclick="setMe(3)">🍭 Леди Палитра</button>
    </div>

    <div id="game-ui" style="display:none;">
        <p>Привет, <b id="my-name-display"></b>!</p>
        <button id="dice-btn" onclick="roll()">🎲 Бросить кубик</button>
        <p id="status">Нажми на кубик!</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="admin-panel">
        <button class="admin-btn" onclick="adminResetGame()">⚙️ СБРОСИТЬ ВСЮ ИГРУ</button>
        <p style="font-size: 10px; color: #888;">(Видно только вам)</p>
    </div>

    <div id="overlay"></div>
    <div id="modal">
        <h2 id="mTitle"></h2>
        <p id="mText" style="font-size: 18px; color: #d81b60;"></p>
        <button onclick="confirmTask()" style="padding:15px; background:#4caf50; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; width:100%;">Я ВЫПОЛНИЛА! ✅</button>
    </div>

        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран
