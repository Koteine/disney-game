<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Online Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive; background: #fff5f8; text-align: center; color: #444; margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        h1 { cursor: pointer; user-select: none; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 500px; margin: 20px auto; }
        .cell { 
            width: 100%; aspect-ratio: 1 / 1; border: 2px solid #ddd; border-radius: 12px; 
            background: white; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; transition: 0.2s; position: relative; font-weight: bold; font-size: 14px;
        }
        .target { border: 4px solid #ff007f !important; transform: scale(1.05); cursor: pointer; background: #fff0f5; box-shadow: 0 0 15px #ff007f; z-index: 10; }
        
        .p0 { background: #ffcdd2 !important; border-color: #f44336; }
        .p1 { background: #e1f5fe !important; border-color: #03a9f4; }
        .p2 { background: #f3e5f5 !important; border-color: #9c27b0; }
        .p3 { background: #e8f5e9 !important; border-color: #4caf50; }
        
        .owner-tag { position: absolute; bottom: 2px; font-size: 8px; text-transform: uppercase; color: #333; width: 100%; text-align: center; pointer-events: none; }
        
        #dice-btn { padding: 15px 30px; font-size: 20px; border-radius: 50px; border: none; background: #ff007f; color: white; cursor: pointer; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #dice-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; width: 85%; max-width: 300px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 90; }
        
        .btn-select { padding: 12px; margin: 5px; border: 2px solid #ffcdd2; border-radius: 10px; background: white; cursor: pointer; width: 90%; max-width: 250px; font-size: 16px; display: inline-block; }
        
        #admin-panel { display: none; margin: 40px auto 20px; padding: 15px; border: 2px dashed #ff007f; border-radius: 15px; max-width: 300px; }
        .admin-btn { background: #333; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <h1 id="game-title">✨ Disney Battle ✨</h1>
    
    <div id="player-setup">
        <h3>Выбери игрока:</h3>
        <button class="btn-select" onclick="setMe(0)">✨ Межгалактический почеркушка</button>
        <button class="btn-select" onclick="setMe(1)">🖌️ Марсианин ищет синий</button>
        <button class="btn-select" onclick="setMe(2)">🦄 Краска вытекла</button>
        <button class="btn-select" onclick="setMe(3)">🍭 Паста «Красный жуть»</button>
        <button class="btn-select" onclick="setMe(4)">🍆 Баклажан с претензией</button>
        <button class="btn-select" onclick="setMe(5)">👿 Кусь за контур</button>
        <button class="btn-select" onclick="setMe(6)">🌼 Квадратный корень из краски</button>
        <button class="btn-select" onclick="setMe(7)">🐨 Крадущийся ленивец</button>
        <button class="btn-select" onclick="setMe(8)">🔥 Графон на ультрах</button>
        <button class="btn-select" onclick="setMe(9)">🌈 Пиксельный Мазок</button>
        <button class="btn-select" onclick="setMe(10)">👀 Залипаю в контур</button>
    </div>

    <div id="game-ui" style="display:none;">
        <p>Привет, <b id="my-name-display"></b>!</p>
        <button id="dice-btn" onclick="roll()">🎲 Бросить кубик</button>
        <p id="status">Нажми на кубик!</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="admin-panel">
        <p style="font-weight: bold; color: #ff007f;">Админ-панель</p>
        <button class="admin-btn" onclick="adminResetGame()">🚫 СБРОСИТЬ ВСЮ ИГРУ</button>
    </div>

    <div id="overlay"></div>
    <div id="modal">
        <h2 id="mTitle" style="margin-top:0;"></h2>
        <p id="mText" style="font-size: 18px; color: #d81b60;"></p>
        <button onclick="confirmTask()" style="padding:15px; background:#4caf50; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; width:100%;">Я ВЫПОЛНИЛА! ✅</button>
    </div>

    <script>
        // Настройки Telegram
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Настройки Firebase
        const firebaseConfig = {
            databaseURL: "https://disneyquest-acaa0-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const players = [
            { n: "Королева Блесток", c: "p0" },
            { n: "Мастер Кисточки", c: "p1" },
            { n: "Эльф Раскрасок", c: "p2" },
            { n: "Леди Палитра", c: "p3" }
        ];

        const tasks = [
            "Нарисуй очки любому герою", "Раскрась воду голубым", "Найди героя с ушами", "⭐ РАСКРАСЬ ДВЕ КАРТИНКИ", 
            "Нарисуй цветок", "Раскрась шляпу", "Найди летающего героя", "Нарисуй яблоко", 
            "Только 3 цвета на страницу", "Розовый фон", "⭐ ВЫБЕРИ ЦВЕТ С ЗАКРЫТЫМИ ГЛАЗАМИ", "Нарисуй Белоснежку",
            "Герой из Короля Льва", "Маленький персонаж", "Дорисуй палочку", "Герой Холодного Сердца",
            "Нарисуй замок", "⭐ ЦВЕТ ВЫБИРАЕТ ПОДРУГА", "Лесной житель", "Нарисуй морковку",
            "Сделай градиент на фоне", "Раскрась злодея", "Ночное небо", "⭐ КРАСЬ ЛЕВОЙ РУКОЙ",
            "Раскрась разворот", "Добавь узоры на платье", "Нарисуй ассоциацию", "Эффект свечения",
            "Нарисуй друга герою", "👑 ФИНАЛЬНЫЙ ШЕДЕВР"
        ];

        let myIndex = null;
        let selectedCell = null;
        const ADMIN_ID = 341995937;

        // --- ЛОГИКА АДМИНКИ ---
        const adminPanel = document.getElementById('admin-panel');
        
        // 1. Проверка по ID (для Телеграм)
        if (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === ADMIN_ID) {
            adminPanel.style.display = 'block';
        }

        // 2. Секретный вход (5 кликов по заголовку для браузера)
        let clicks = 0;
        document.getElementById('game-title').onclick = () => {
            clicks++;
            if (clicks === 5) {
                adminPanel.style.display = 'block';
                alert("Админ-режим включен!");
            }
        };

        function adminResetGame() {
            if (confirm("Вы точно хотите полностью очистить игровое поле?")) {
                db.ref('board').set(null).then(() => {
                    alert("Игра сброшена!");
                    location.reload();
                });
            }
        }
        // ----------------------

        function setMe(idx) {
            myIndex = idx;
            document.getElementById('player-setup').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('my-name-display').innerText = players[idx].n;
        }

        const gridDiv = document.getElementById('grid');
        for(let i=0; i<30; i++) {
            let div = document.createElement('div');
            div.className = 'cell';
            div.id = 'cell-' + i;
            div.innerHTML = `<div>${i+1}</div>`;
            gridDiv.appendChild(div);
        }

        function roll() {
            document.getElementById('dice-btn').disabled = true;
            if(selectedCell !== null) {
                const prev = document.getElementById('cell-' + selectedCell);
                if (prev) prev.classList.remove('target');
            }

            db.ref('board').once('value', (snap) => {
                const data = snap.val() || {};
                let free = [];
                for(let i=0; i<30; i++) if(!data[i]) free.push(i);
                
                if(free.length === 0) {
                    alert("Все раскрашено! Вы молодцы!");
                    document.getElementById('dice-btn').disabled = false;
                    return;
                }
                
                selectedCell = free[Math.floor(Math.random() * free.length)];
                document.getElementById('status').innerText = "Твоя цель: клетка №" + (selectedCell + 1);
                
                const target = document.getElementById('cell-' + selectedCell);
                target.classList.add('target');
                target.onclick = function() {
                    document.getElementById('mTitle').innerText = "Задание №" + (selectedCell + 1);
                    document.getElementById('mText').innerText = tasks[selectedCell];
                    document.getElementById('modal').style.display = 'block';
                    document.getElementById('overlay').style.display = 'block';
                };
            });
        }

        function confirmTask() {
            db.ref('board/' + selectedCell).set({
                owner: myIndex,
                name: players[myIndex].n
            });
            
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('dice-btn').disabled = false;
            document.getElementById('status').innerText = "Клетка захвачена!";
            document.getElementById('cell-' + selectedCell).classList.remove('target');
            document.getElementById('cell-' + selectedCell).onclick = null;
            selectedCell = null;
        }

        db.ref('board').on('value', (snap) => {
            const data = snap.val() || {};
            for(let i=0; i<30; i++) {
                const cell = document.getElementById('cell-' + i);
                if (!data[i]) {
                    cell.className = 'cell';
                    cell.innerHTML = `<div>${i+1}</div>`;
                } else {
                    const p = players[data[i].owner];
                    cell.className = 'cell ' + p.c;
                    cell.innerHTML = `<div>${parseInt(i)+1}</div><div class="owner-tag">${p.n.split(' ')[0]}</div>`;
                    cell.onclick = null;
                }
            }
        });
    </script>
</body>
</html>
