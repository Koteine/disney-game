<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Battle: Magic Link</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --p-pink: #ff007f; --p-bg: #fff5f8; --p-purple: #a020f0; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--p-bg); text-align: center; color: #333; margin: 0; padding: 5px 5px 80px 5px; overflow-x: hidden; }
        
        /* Сетка */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; width: 100%; max-width: 500px; margin: 10px auto; padding: 0 5px; }
        .cell { width: 100%; aspect-ratio: 1/1; border: 1px solid #ddd; border-radius: 6px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; position: relative; }
        .cell span { font-size: 7px; margin-top: 2px; }
        
        /* Стили клеток */
        .cell.gold { border: 2px solid #ffaa00 !important; background: #fffdf0; }
        .cell.coop { border: 2px solid var(--p-purple) !important; animation: pulse-purple 2s infinite; background: #fdf0ff; }
        @keyframes pulse-purple { 0% { box-shadow: 0 0 0 0 rgba(160, 32, 240, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(160, 32, 240, 0); } 100% { box-shadow: 0 0 0 0 rgba(160, 32, 240, 0); } }
        .cell.excluded { opacity: 0.5; filter: grayscale(1); }

        /* Эффекты взрыва и тряски */
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-4px,0); } 20%, 40%, 60%, 80% { transform: translate(4px,0); } }
        .apply-shake { animation: shake 0.5s; }

        /* Остальное */
        .timer-box { background: white; border-radius: 12px; padding: 10px; margin: 5px auto; width: 95%; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; height: 65px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { background: none; border: none; font-size: 10px; color: #888; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .nav-item.active { color: var(--p-pink); font-weight: bold; }
        #dice-btn, .admin-btn { padding: 12px; font-size: 15px; border-radius: 12px; border: none; background: var(--p-pink); color: white; font-weight: bold; width: 95%; margin: 8px 0; }
        #dice-btn:disabled { background: #ccc; }
        #modal, #overlay { display: none; }
        #modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 15px; border-radius: 20px; z-index: 1100; width: 90%; max-height: 85vh; overflow-y: auto; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1050; }
        .tab-content { display: none; }
        .tab-active { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; background: white; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="tab-game" class="tab-content tab-active">
            <h1>🏰 Disney Battle</h1>
            <div id="player-identity" style="font-size:11px; margin-bottom:5px;">...</div>
            <div class="timer-box">
                <div id="round-info" style="font-size:11px; color:var(--p-pink); font-weight:bold;">Раунд №--</div>
                <div id="round-timer">0д 00:00:00</div>
            </div>
            <button id="dice-btn" onclick="roll()" disabled>🎲 Бросить кубик</button>
            <div class="grid" id="grid"></div>
        </div>

        <div id="tab-tickets" class="tab-content">
            <h1>🎫 Билеты</h1>
            <table id="t-table">
                <thead style="background:var(--p-pink); color:white;">
                    <tr><th id="th-user" style="display:none;">Игрок</th><th>Билет</th><th id="th-status" style="display:none;">OK?</th></tr>
                </thead>
                <tbody id="tickets-body"></tbody>
            </table>
        </div>

        <div id="tab-wheel" class="tab-content">
            <h1>🎡 Колесо</h1>
            <div id="winner-display" style="font-weight:bold; color:var(--p-pink); min-height:40px; font-size:14px; padding:5px;">Удачи!</div>
            <canvas id="wheel-canvas" width="280" height="280" style="transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); margin: 0 auto; display: block;"></canvas>
            <div id="wheel-admin-btn"></div>
        </div>

        <div id="tab-admin" class="tab-content">
            <h1>⚙️ Админка</h1>
            <button onclick="adminStartNewRound()" class="admin-btn" style="background:#4CAF50;">НОВЫЙ РАУНД + ЛОВУШКИ</button>
            <div id="active-players" style="margin: 10px; font-size: 12px; text-align: left;"></div>
            <button onclick="adminFullReset()" class="admin-btn" style="background:#f44336; font-size:10px;">СБРОС БАЗЫ</button>
        </div>

        <nav class="nav-bar">
            <button class="nav-item active" onclick="switchTab('tab-game', this)"><span>Поле</span></button>
            <button class="nav-item" onclick="switchTab('tab-tickets', this)"><span>Билеты</span></button>
            <button class="nav-item" onclick="switchTab('tab-wheel', this)"><span>Колесо</span></button>
            <button id="nav-admin-btn" class="nav-item" style="display:none;" onclick="switchTab('tab-admin', this)"><span>Админ</span></button>
        </nav>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal"><h2 id="mTitle"></h2><div id="mText"></div><button onclick="closeModal()" class="admin-btn">Закрыть</button></div>

    <script>
        const JSON_URL = 'tasks.json';
        const firebaseConfig = { databaseURL: "https://disneyquest-acaa0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp; tg.ready(); tg.expand();

        const ADMIN_ID = 341995937;
        const currentUserId = tg.initDataUnsafe?.user?.id || 0;
        const charColors = ["#FFADAD","#FFD6A5","#FDFFB6","#CAFFBF","#9BF6FF","#A0C4FF","#BDB2FF","#FFC6FF","#FFFFFC","#FF8585","#FFB347","#F0E68C","#90EE90","#87CEFA","#6495ED","#9370DB","#FF69B4","#F5F5DC","#CD5C5C","#FFA500","#EEDD82","#3CB371","#00CED1","#4169E1","#8A2BE2","#C71585","#D3D3D3","#FA8072","#FF8C00","#BDB76B","#2E8B57","#20B2AA","#1E90FF","#9400D3","#FF1493","#A9A9A9","#E9967A","#DAA520","#8FBC8F","#008080","#0000CD","#800080","#DC143C","#808080","#B0C4DE","#FF4500","#556B2F","#008B8B","#000080","#4B0082"];
        const players = [{n:"Ван Гог"},{n:"Пикассо"},{n:"Мокрая кисть"},{n:"Королева"},{n:"Барон"},{n:"Укротитель"},{n:"Ластик"},{n:"Монстр"},{n:"Клякса"},{n:"Сомелье"},{n:"Дали"},{n:"Мольберт"},{n:"Кисточка"},{n:"Акварель"},{n:"Магнат"},{n:"Джедай"},{n:"Растушевка"},{n:"Творец"},{n:"Холст"},{n:"Террорист"},{n:"Мазила"},{n:"Худо"},{n:"Мазок"},{n:"Гамлет"},{n:"Деспот"},{n:"Маньяк"},{n:"Винчик"},{n:"Шедевр"},{n:"Грозный"},{n:"Повелитель"},{n:"Гуру"},{n:"Судьба"},{n:"Анархист"},{n:"Скотч"},{n:"Рецидивист"},{n:"Рыцарь"},{n:"Гнев"},{n:"Пират"},{n:"Бродяга"},{n:"Эстет"},{n:"Замес"},{n:"Точилка"},{n:"Сечение"},{n:"Масло"},{n:"Фантазер"},{n:"Маратель"},{n:"Делец"},{n:"Призрак"},{n:"Ниндзя"},{n:"Муза"}];
        const coopTasks = [
            "Магическая связь: Рисуем две стороны медали! Одна - героя, вторая - его злодейскую версию.",
            "Магическая связь: Сквозь время! Одна рисует baby-версию персонажа, вторая - его же старичком.",
            "Магическая связь: Портал! Одна рисует, как персонаж лезет в портал, вторая - как он вылезает.",
            "Магическая связь: День и Ночь! Одна рисует сюжет в теплых солнечных тонах, вторая - в ночных холодных.",
            "Магическая связь: Стиль! Договоритесь и нарисуйте одного персонажа, но поменяйтесь своими привычными стилями."
        ];

        let tasks = [], myIndex = -1, currentRoundNum = 0, roundEndTime = 0, allTicketsData = [];

        async function init() {
            try { const res = await fetch(JSON_URL); tasks = await res.json(); checkAccess(); syncData(); } catch(e) { console.error(e); }
        }

        function checkAccess() {
            if (currentUserId === ADMIN_ID) {
                document.getElementById('nav-admin-btn').style.display='flex';
                document.getElementById('th-user').style.display = 'table-cell';
                document.getElementById('th-status').style.display = 'table-cell';
                document.getElementById('wheel-admin-btn').innerHTML = `<button onclick="adminTriggerSpin()" class="admin-btn">КРУТИТЬ КОЛЕСО</button>`;
            }
            db.ref('whitelist/' + currentUserId).on('value', s => { if (s.exists()) { myIndex = s.val().charIndex; document.getElementById('player-identity').innerHTML = `Ты: <span style="color:${charColors[myIndex]}">${players[myIndex].n}</span>`; } });
        }

        function syncData() {
            db.ref('current_round').on('value', snap => { if (snap.exists()) { currentRoundNum = snap.val().number; roundEndTime = snap.val().endTime; document.getElementById('round-info').innerText = "Раунд №" + currentRoundNum; updateTimer(); } });
            db.ref('board').on('value', snap => {
                const data = snap.val() || {}, grid = document.getElementById('grid'); grid.innerHTML = "";
                allTicketsData = [];
                for(let i=0; i<50; i++) {
                    const cell = data[i]; let d = document.createElement('div');
                    d.className = 'cell' + (cell?.isGold ? ' gold' : '') + (cell?.isCoop ? ' coop' : '') + (cell?.excluded ? ' excluded' : '');
                    if (cell) {
                        d.style.borderColor = charColors[cell.owner]; d.style.background = charColors[cell.owner] + "15";
                        d.innerHTML = (cell.isTrap ? "💣" : (cell.isCoop ? "✨" : (i+1))) + `<span>🎟${cell.ticket}</span>`;
                        allTicketsData.push({ ...cell, cell: i+1 });
                    } else d.innerHTML = (i+1);
                    d.onclick = () => showCell(i, cell); grid.appendChild(d);
                }
                updateTicketsTable();
            });
        }

        async function roll() {
            const boardSnap = await db.ref('board').once('value'), board = boardSnap.val() || {};
            const rSnap = await db.ref('current_round').once('value'), rData = rSnap.val();
            let free = []; for(let i=0; i<50; i++) if(!board[i]) free.push(i);
            if (!free.length || (roundEndTime - Date.now() <= 0)) return;

            const cellIdx = free[Math.floor(Math.random()*free.length)];
            const isTrap = rData.traps && rData.traps.includes(cellIdx);
            
            let isCoop = false, coopText = "", partnerId = null;

            // Логика Магической связи
            const pSnap = await db.ref('pending_coop').once('value');
            if (!isTrap && pSnap.exists() && pSnap.val().owner !== myIndex) {
                // Пара нашлась!
                const wait = pSnap.val();
                isCoop = true; partnerId = wait.owner; coopText = wait.task;
                await db.ref('pending_coop').remove();
                await db.ref(`board/${wait.cellIdx}/trapText`).set(`Связь установлена с ${players[myIndex].n}! Задание: ${coopText}`);
            } else if (!isTrap && Math.random() < 0.1) { // 10% шанс стать "ждуном" связи
                isCoop = true;
                coopText = coopTasks[Math.floor(Math.random()*coopTasks.length)];
                await db.ref('pending_coop').set({ owner: myIndex, cellIdx: cellIdx, task: coopText });
            }

            const tCounter = await db.ref('ticket_counter').transaction(c => (c || 0) + 1);
            let tStr = tCounter.snapshot.val().toString();
            if (isCoop && partnerId) tStr = (parseInt(tStr)).toString() + ", " + (parseInt(tStr)+1) + ", " + (parseInt(tStr)+2); // 3 билета

            const traps = ["Детка, это ловушка Капитана Крюка! Чтобы освободиться, рисуй своей не ведущей рукой!","Ха-ха! Задача трудная - за тобой разворот!"];
            const cellData = {
                owner: myIndex,
                ticket: tStr,
                isTrap: isTrap,
                isCoop: isCoop,
                isGold: !isTrap && !isCoop && Math.random() < 0.05,
                trapText: isTrap ? traps[Math.floor(Math.random()*2)] : (isCoop ? (partnerId ? `Пара найдена: ${players[partnerId].n}! Тема: ${coopText}` : "Ищем пару для связи...") : ""),
                taskIdx: (isTrap || isCoop) ? -1 : Math.floor(Math.random()*tasks.length),
                round: currentRoundNum
            };

            await db.ref('board/'+cellIdx).set(cellData);
            await db.ref(`whitelist/${currentUserId}/last_round`).set(currentRoundNum);
            showCell(cellIdx, cellData);
        }

        function showCell(i, cell) {
            if(!cell) return;
            const isAdmin = (currentUserId === ADMIN_ID), isOwner = (cell.owner === myIndex);
            if (cell.isTrap && (isOwner || isAdmin)) { 
                new Audio('https://www.soundjay.com/mechanical/explosion-01.mp3').play();
                document.body.classList.add('apply-shake'); setTimeout(()=>document.body.classList.remove('apply-shake'), 500);
            }
            document.getElementById('mTitle').innerText = cell.isTrap ? "💣 БУМ!" : (cell.isCoop ? "✨ МАГИЧЕСКАЯ СВЯЗЬ" : "Клетка "+(i+1));
            let h = `<p>Художник: <b>${players[cell.owner].n}</b><br>Билет: ${cell.ticket}</p>`;
            if (isOwner || isAdmin) {
                if(cell.isTrap || cell.isCoop) h += `<div style="color:var(--p-pink); font-weight:bold; padding:10px; border:1px solid; border-radius:10px;">${cell.trapText}</div>`;
                else { const t = tasks[cell.taskIdx]; if(t) { if(t.img) h += `<img src="${t.img}" style="width:100%; border-radius:10px;">`; h += `<p>${t.text}</p>`; } }
            } else h += `<p>🔒 Скрыто</p>`;
            document.getElementById('mText').innerHTML = h;
            document.getElementById('modal').style.display='block'; document.getElementById('overlay').style.display='block';
        }

        async function adminStartNewRound() {
            const boardSnap = await db.ref('board').once('value'), board = boardSnap.val() || {};
            let free = []; for(let i=0; i<50; i++) if(!board[i]) free.push(i);
            let traps = []; for(let j=0; j<2; j++) if(free.length) traps.push(free.splice(Math.floor(Math.random()*free.length), 1)[0]);
            const s = await db.ref('current_round/number').once('value');
            await db.ref('current_round').set({ number: (s.val()||0)+1, endTime: Date.now() + 86400000, traps: traps });
            await db.ref('pending_coop').remove(); // Сброс ожидания пары
            alert("Раунд начат!");
        }

        function updateTimer() {
            setInterval(() => {
                const diff = roundEndTime - Date.now();
                if (diff <= 0) document.getElementById('round-timer').innerText = "ОКОНЧЕН";
                else {
                    const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                    document.getElementById('round-timer').innerText = `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    db.ref(`whitelist/${currentUserId}/last_round`).once('value', s => {
                        document.getElementById('dice-btn').disabled = (s.val() === currentRoundNum || diff <= 0);
                    });
                }
            }, 1000);
        }

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
        function closeModal() { document.getElementById('modal').style.display='none'; document.getElementById('overlay').style.display='none'; }
        function updateTicketsTable() {
            const body = document.getElementById('tickets-body'), isAdmin = (currentUserId === ADMIN_ID);
            body.innerHTML = allTicketsData.map(t => `<tr class="${t.excluded?'row-excluded':''}">
                ${isAdmin?`<td>${players[t.owner].n}</td>`:''}<td>${t.ticket}</td>
                ${isAdmin?`<td><button onclick="db.ref('board/${t.cell-1}/excluded').set(!${t.excluded})">🆗</button></td>`:''}
            </tr>`).join('');
        }
        init();
    </script>
</body>
</html>
