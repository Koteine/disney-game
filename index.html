<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Battle 50</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fff5f8; text-align: center; color: #444; margin: 0; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 500px; margin: 15px auto; }
        .cell { width: 100%; aspect-ratio: 1/1; border: 1px solid #ddd; border-radius: 8px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; font-weight: bold; font-size: 12px; }
        .target { border: 3px solid #ff007f !important; transform: scale(1.05); cursor: pointer; background: #fff0f5; box-shadow: 0 0 10px #ff007f; z-index: 10; }
        .p0, .p4, .p8 { background: #ffcdd2 !important; } .p1, .p5, .p9 { background: #e1f5fe !important; }
        .p2, .p6, .p10 { background: #f3e5f5 !important; } .p3, .p7 { background: #e8f5e9 !important; }
        .owner-tag { position: absolute; bottom: 1px; font-size: 7px; width: 100%; text-align: center; }
        #dice-btn { padding: 12px 25px; font-size: 18px; border-radius: 50px; border: none; background: #ff007f; color: white; cursor: pointer; margin: 10px; }
        #dice-btn:disabled { background: #ccc; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 100; width: 85%; max-width: 300px; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 90; }
        .btn-select { padding: 10px; margin: 4px; border: 2px solid #ffcdd2; border-radius: 10px; background: white; cursor: pointer; width: 90%; max-width: 250px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>✨ Disney Battle 50 ✨</h1>
    
    <div id="player-setup">
        <h3>Выбери игрока:</h3>
        <div id="setup-buttons"></div>
    </div>

    <div id="game-ui" style="display:none;">
        <p>Привет, <b id="my-name-display"></b>!</p>
        <button onclick="location.reload()" style="background:none; border:1px solid #ccc; border-radius:10px; padding:5px; cursor:pointer; font-size:10px;">🔄 Сменить персонажа</button>
        <br><br>
        <button id="dice-btn" onclick="roll()">🎲 Бросить кубик</button>
        <p id="status">Нажми на кубик!</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="admin-panel" style="display:none; margin-top:20px; padding:10px; border:2px dashed red;">
        <button onclick="adminResetGame()" style="background:red; color:white; border:none; padding:10px; border-radius:10px; cursor:pointer;">🚫 СБРОС ИГРЫ</button>
    </div>

    <div id="overlay"></div>
    <div id="modal">
        <h2 id="mTitle" style="font-size:18px;"></h2>
        <div id="mContent" style="margin: 15px 0;"><p id="mText"></p></div>
        <button onclick="confirmTask()" style="padding:12px; background:#4caf50; color:white; border:none; border-radius:10px; cursor:pointer; width:100%; font-weight:bold;">Я ВЫПОЛНИЛА! ✅</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://disneyquest-acaa0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const players = [
            { n: "Межгалактический почеркушка", c: "p0" }, { n: "Марсианин ищет синий", c: "p1" },
            { n: "Краска вытекла", c: "p2" }, { n: "Паста «Красный жуть»", c: "p3" },
            { n: "Баклажан с претензией", c: "p4" }, { n: "Кусь за контур", c: "p5" },
            {
