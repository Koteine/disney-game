    <script>
        // 2. ОПРЕДЕЛЯЕМ ФУНКЦИИ СРАЗУ (Чтобы не было ошибки "not defined")
        const pData = [
            { n: "Королева Блесток", c: "p0" }, 
            { n: "Мастер Кисточки", c: "p1" },
            { n: "Эльф Раскрасок", c: "p2" }, 
            { n: "Леди Палитра", c: "p3" }
        ];

        window.setPlayer = function(id) {
            console.log("Кнопка нажата, ID:", id);
            const setup = document.getElementById('setup-screen');
            const game = document.getElementById('game-screen');
            if (setup && game) {
                setup.style.display = 'none';
                game.style.display = 'block';
                document.getElementById('p-name').innerText = pData[id].n;
                window.myIdx = id;
            }
        };

        // Запасной вариант функции
        window.go = window.setPlayer;
    </script>

    <style>

        .btn-select:active { transform: translateY(2px); box-shadow: none; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 350px; margin: 15px auto; }

        .target { border: 3px solid #ff007f !important; background: #fff0f5 !important; }
        .p0 { background: #ffcdd2 !important; } .p1 { background: #e1f5fe !important; } 
        .p2 { background: #f3e5f5 !important; } .p3 { background: #e8f5e9 !important; } 
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 2000; width: 250px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        #dice-btn { padding: 15px 30px; background: #ff007f; color: white; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; }
