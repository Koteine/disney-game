<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Disney Battle</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #fff5f8; text-align: center; margin: 0; padding: 10px; }
        .btn-select { padding: 15px; margin: 10px auto; border: 2px solid #ffcdd2; border-radius: 12px; background: white; width: 250px; display: block; cursor: pointer; font-size: 16px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; max-width: 350px; margin: 15px auto; }
        .cell { width: 60px; height: 60px; border: 1px solid #ccc; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; position: relative; }
        .target { border: 3px solid #ff007f !important; background: #fff0f5 !important; }
        .p0 { background: #ffcdd2 !important; } .p1 { background: #e1f5fe !important; } 
        .p2 { background: #f3e5f5 !important; } .p3 { background: #e8f5e9 !important; } 
        .owner-tag { position: absolute; bottom: 2px; font-size: 8px; width: 100%; text-align: center; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 20px; z-index: 2000; width: 250px; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        #dice-btn { padding: 15px 30px; background: #ff007f; color: white; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; }
    </style>
</head>

    </div>
