<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Disney Battle Trap Edition V6</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>

:root{
--pink:#ff007f;
--bg:#fff5f8;
}

body{
font-family:-apple-system,system-ui,sans-serif;
background:var(--bg);
margin:0;
padding:6px 6px 90px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:4px;
max-width:500px;
margin:auto;
}

.cell{
aspect-ratio:1/1;
background:white;
border-radius:6px;
border:1px solid #ddd;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-weight:bold;
font-size:11px;
position:relative;
}

.cell span{
font-size:8px;
margin-top:2px;
}

.cell.gold{
border:2px solid gold!important;
background:#fff8dc;
}

.cell.excluded{
opacity:.5;
filter:grayscale(1);
}

button{
background:var(--pink);
border:none;
color:white;
padding:14px 18px;
border-radius:10px;
font-size:16px;
margin-top:10px;
}

.timer{
font-weight:bold;
margin:10px;
}

.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
border-radius:14px;
padding:20px;
width:90%;
max-width:380px;
z-index:5;
display:none;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
z-index:4;
display:none;
}

</style>
</head>

<body>

<h3 id="round-info">Раунд</h3>
<div class="timer" id="round-timer"></div>

<div class="grid" id="grid"></div>

<button id="dice-btn">🎲 Бросить кубик</button>

<div class="overlay" id="overlay"></div>

<div class="modal" id="modal">
<h3 id="mTitle"></h3>
<div id="mText"></div>
<br>
<button onclick="closeModal()">Закрыть</button>
</div>

<script>

const BOARD_SIZE=50
const ADMIN_ID=341995937
const JSON_URL='tasks.json'

const firebaseConfig={
databaseURL:"https://disneyquest-acaa0-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()
const tg=window.Telegram.WebApp

tg.ready()
tg.expand()

const userId=tg.initDataUnsafe?.user?.id||0

const grid=document.getElementById("grid")
const timerEl=document.getElementById("round-timer")
const roundEl=document.getElementById("round-info")
const diceBtn=document.getElementById("dice-btn")

const modal=document.getElementById("modal")
const overlay=document.getElementById("overlay")
const mTitle=document.getElementById("mTitle")
const mText=document.getElementById("mText")

let tasks=[]
let myIndex=-1
let round=0
let endTime=0
let tickets=[]

let timerInterval=null

const players=[
{n:"Микки"},
{n:"Минни"},
{n:"Дональд"},
{n:"Дейзи"},
{n:"Гуфи"}
]

const colors=[
"#ff3b3b",
"#ff66cc",
"#4aa3ff",
"#ffaa00",
"#55cc66"
]

async function init(){

const res=await fetch(JSON_URL,{cache:"force-cache"})
tasks=await res.json()

syncUser()
syncGame()

}

function syncUser(){

db.ref("whitelist/"+userId).on("value",s=>{

if(!s.exists())return

myIndex=s.val().charIndex

})

}

function syncGame(){

db.ref("current_round").on("value",s=>{

if(!s.exists())return

const r=s.val()

round=r.number
endTime=r.endTime

roundEl.innerText="Раунд №"+round

startTimer()

})

db.ref("board").on("value",s=>{

drawBoard(s.val()||{})

})

}

function startTimer(){

clearInterval(timerInterval)

timerInterval=setInterval(()=>{

const diff=endTime-Date.now()

if(diff<=0){

timerEl.innerText="Раунд завершен"
diceBtn.disabled=true
return

}

const h=Math.floor(diff/3600000)
const m=Math.floor((diff%3600000)/60000)
const sec=Math.floor((diff%60000)/1000)

timerEl.innerText=
`${h}:${m.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`

},1000)

}

function drawBoard(data){

const frag=document.createDocumentFragment()

tickets=[]

for(let i=0;i<BOARD_SIZE;i++){

const c=data[i]

const div=document.createElement("div")
div.className="cell"

if(c){

if(c.isGold)div.classList.add("gold")
if(c.excluded)div.classList.add("excluded")

const col=colors[c.owner]

div.style.borderColor=col
div.style.background=col+"22"

div.innerHTML=(c.isTrap?"💣":i+1)+`<span>🎟${c.ticket}</span>`

tickets.push({...c,cell:i})

}else{

div.innerText=i+1

}

div.onclick=()=>showCell(i,c)

frag.appendChild(div)

}

grid.innerHTML=""
grid.appendChild(frag)

}

diceBtn.onclick=roll

async function roll(){

const board=(await db.ref("board").once("value")).val()||{}

const free=[]

for(let i=0;i<BOARD_SIZE;i++){

if(!(i in board))free.push(i)

}

if(!free.length)return alert("Нет клеток")

const cell=free[Math.floor(Math.random()*free.length)]

const taskIdx=Math.floor(Math.random()*tasks.length)

const ticketRes=
await db.ref("ticket_counter").transaction(c=>(c||0)+1)

const ticket=ticketRes.snapshot.val()

const data={
owner:myIndex,
userId:userId,
taskIdx,
ticket,
round,
excluded:false
}

await db.ref("board/"+cell).set(data)

showCell(cell,data)

}

function showCell(i,c){

if(!c)return

const isOwner=c.owner===myIndex
const isAdmin=userId===ADMIN_ID

let html=`
<p><b>${players[c.owner].n}</b></p>
<p>Билет 🎟 ${c.ticket}</p>
`

if(isOwner||isAdmin){

const t=tasks[c.taskIdx]

if(t){

if(t.img)html+=`<img src="${t.img}" style="width:100%">`

html+=`<p>${t.text}</p>`

}

}else{

html+=`<p>🔒 Задание скрыто</p>`

}

mTitle.innerText="Клетка "+(i+1)
mText.innerHTML=html

modal.style.display="block"
overlay.style.display="block"

}

function closeModal(){

modal.style.display="none"
overlay.style.display="none"

}

overlay.onclick=closeModal

init()

</script>

</body>
</html>
